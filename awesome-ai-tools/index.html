* { margin:0; padding:0; box-sizing:border-box; }
body {

  color: var(--text);

  line-height: 1.7;
  -webkit-font-smoothing: antialiased;

.container { max-width: 1000px; margin:0 auto; padding:0 20px; }

/* Hero */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content:'';
  position:absolute; inset:0;
  background:

}
.hero-icon { font-size:3rem; margin-bottom:12px; }
.hero h1 {
  font-size: clamp(1.6rem,4vw,2.2rem);
  font-weight:800;
  background: linear-gradient(135deg, var(--orange), var(--gold), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.hero p { color:var(--text2); margin-top:8px; font-size:0.95rem; }
.hero .stats {
  display:flex; gap:20px; justify-content:center; flex-wrap:wrap;
  margin-top:16px;
}
.hero .stat {
  padding:4px 14px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:20px; font-size:0.8rem; color:var(--text3);
}
.hero .stat strong { color:var(--orange); }

/* Search */
.search-bar {
  max-width: 500px;
  margin: 0 auto 32px;
  position: relative;
}
.search-bar input {
  width:100%;
  padding:12px 16px 12px 44px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-size:0.9rem;
  font-family:inherit;
  outline:none;
  transition:border-color .3s;
}
.search-bar input:focus { border-color:var(--orange); }
.search-bar input::placeholder { color:var(--text3); }
.search-bar .search-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--text3); font-size:0.9rem;
}

/* Nav tabs */
.cat-nav {
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  margin-bottom:32px;
}
.cat-btn {
  padding:6px 16px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:100px;
  color:var(--text2);
  font-size:0.8rem;
  font-family:inherit;
  cursor:pointer;
  transition:all .3s;
}
.cat-btn:hover, .cat-btn.active {
  border-color:var(--orange);
  color:var(--orange);
  background:rgba(255,140,66,0.1);
}

/* Tool cards */

  margin-bottom:16px;
  padding-bottom:8px;

  display:flex;
  align-items:center;
  gap:8px;

.tool-card {
  display:grid;
  grid-template-columns: 1fr auto auto;
  gap:12px;
  align-items:center;
  padding:12px 16px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:8px;
  transition:all .3s;
}
.tool-card:hover {
  border-color:rgba(255,140,66,0.3);
  transform:translateX(4px);
}
.tool-card .tool-name {
  font-weight:600;
  font-size:0.9rem;
  color:var(--cyan);
  text-decoration:none;
}
.tool-card .tool-name:hover { text-decoration:underline; color:var(--orange); }
.tool-card .tool-desc { font-size:0.82rem; color:var(--text2); margin-top:2px; }
.tool-card .tool-price {
  font-family:'JetBrains Mono',monospace;
  font-size:0.75rem;
  padding:3px 10px;
  border-radius:6px;
  white-space:nowrap;

.price-free { background:rgba(74,222,128,0.1); color:var(--green); border:1px solid rgba(74,222,128,0.2); }
.price-paid { background:rgba(255,140,66,0.1); color:var(--gold); border:1px solid rgba(255,140,66,0.2); }
.price-free-paid { background:rgba(167,139,250,0.1); color:var(--purple); border:1px solid rgba(167,139,250,0.2); }
.tool-card .tool-reason {

  .tool-card .tool-price { width:fit-content; }
