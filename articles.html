<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猿来AI · 全部文章</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .page-wrap { max-width: 900px; margin: 0 auto; padding: 100px 24px 80px; }
  .page-wrap h1 {
    font-size: clamp(1.6rem, 3vw, 2rem); font-weight: 700;
    margin-bottom: 8px; text-align: center;
    color: var(--text-primary);
  }
  .page-wrap .subtitle {
    text-align: center;
    color: var(--text-secondary);
    margin-bottom: 48px;
    font-size: 0.9rem;
  }
  .article-item {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    margin-bottom: 16px; transition: all var(--transition);
    display: block; text-decoration: none; color: inherit;
  }
  .article-item:hover {
    border-color: var(--accent-orange);
    box-shadow: 0 4px 20px rgba(255,140,66,0.08);
    transform: translateY(-2px);
  }
  .article-item .meta {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px;
  }
  .article-item .meta .tag {
    font-family: var(--font-mono); font-size: 0.7rem;
    padding: 3px 10px; background: var(--accent-cyan-dim);
    border: 1px solid rgba(0,217,255,0.2); border-radius: 4px; color: var(--accent-cyan);
  }
  .article-item .meta .date { font-size: 0.8rem; color: var(--text-muted); }
  .article-item .meta .read-time { font-size: 0.8rem; color: var(--text-muted); }
  .article-item h3 {
    font-size: 1rem; font-weight: 600; margin-bottom: 8px;
    color: var(--text-primary);
  }
  .article-item p { font-size: 0.87rem; color: var(--text-secondary); line-height: 1.6; margin: 0; }
  .pagination { text-align: center; margin-top: 40px; }
  .pagination button {
    font-family: var(--font-sans); font-size: 0.9rem;
    padding: 10px 28px; background: var(--accent-orange);
    color: #fff; border: none; border-radius: var(--radius);
    cursor: pointer; transition: all var(--transition);
  }
  .pagination button:hover { opacity: 0.85; transform: translateY(-1px); }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .pagination .info { font-size: 0.85rem; color: var(--text-muted); margin-left: 16px; }
</style>
</head>
<body>

<!-- Navbar (same as main site) -->
<nav id="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <img src="assets/images/xiaoyuan.png" alt="猿来AI" class="nav-mascot">
      <span class="nav-brand">猿来AI</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#home" class="nav-link active">首页</a>
      <a href="awesome-ai-tools/" class="nav-link">AI工具</a>
      <a href="index.html#trending" class="nav-link">AI热点</a>
      <a href="index.html#prompts" class="nav-link">Prompt</a>
      <a href="index.html#articles" class="nav-link">文章</a>
      <a href="index.html#projects" class="nav-link">项目</a>
      <a href="index.html#about" class="nav-link">关于</a>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
      <button class="hamburger" id="hamburger" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<canvas id="bgCanvas"></canvas>

<div class="page-wrap">
  <h1>📝 全部文章</h1>
  <p class="subtitle">AI 趋势解读 · 技术深度分析 · 日常思考</p>
  <div id="articlesList"></div>
  <div class="pagination" id="pagination">
    <button id="loadMoreBtn">加载更多</button>
    <span class="info" id="pageInfo"></span>
  </div>
</div>

<script src="data.js?v=20260611c"></script>
<script>
  var articles = window.siteData && window.siteData.articles ? window.siteData.articles : [];
  var PAGE_SIZE = 10;
  var loadedCount = 0;

  function renderList() {
    var list = document.getElementById('articlesList');
    var end = Math.min(loadedCount + PAGE_SIZE, articles.length);
    for (var i = loadedCount; i < end; i++) {
      var a = articles[i];
      var html = '';
      html += '<a href="article.html?id=' + a.id + '" class="article-item">';
      html += '<div class="meta">';
      for (var j = 0; j < a.tags.length; j++) {
        html += '<span class="tag">' + a.tags[j] + '</span>';
      }
      html += '<span class="date">' + a.date + '</span>';
      html += '<span class="read-time">' + a.readTime + '</span>';
      html += '</div>';
      html += '<h3>' + a.title + '</h3>';
      html += '<p>' + a.desc + '</p>';
      html += '</a>';
      list.insertAdjacentHTML('beforeend', html);
    }
    loadedCount = end;
    document.getElementById('pageInfo').textContent = '已显示 ' + loadedCount + ' / ' + articles.length + ' 篇';
    if (loadedCount >= articles.length) {
      document.getElementById('loadMoreBtn').disabled = true;
      document.getElementById('loadMoreBtn').textContent = '已加载全部';
    }
  }

  renderList();
  document.getElementById('loadMoreBtn').addEventListener('click', renderList);
</script>
<script src="app.js"></script>
</body>
</html>
