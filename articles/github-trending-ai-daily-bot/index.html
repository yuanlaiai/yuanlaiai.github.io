<script>
  var articles = window.siteData && window.siteData.articles ? window.siteData.articles : [];
  var slug = 'github-trending-ai-daily-bot';
  var article = null;
  for (var i = 0; i < articles.length; i++) {
    if (articles[i].slug === slug) { article = articles[i]; break; }
  }
  var container = document.getElementById('articleDetail');
  if (!article) {
    container.innerHTML = '<div style="text-align:center;padding:80px 0"><h2 style="color:var(--text-primary)">文章不存在</h2><p style="color:var(--text-secondary);margin-top:16px"><a href="../articles.html" style="color:var(--accent-orange)">浏览所有文章 →</a></p></div>';
  } else {
    var html = '<a href="../../articles.html" class="back-link">← 返回文章列表</a>';
    html += '<div class="meta">';
    for (var j = 0; j < article.tags.length; j++) {
      html += '<span class="tag">' + article.tags[j] + '</span>';
    }
    html += '<span class="date">' + article.date + '</span>';
    html += '<span class="read-time">' + article.readTime + '</span>';
    html += '</div>';
    html += '<h1>' + article.title + '</h1>';
    html += '<div class="body">' + article.content + '</div>';
    if (article.wechatUrl) {
      html += '<a class="wechat-link" href="' + article.wechatUrl + '" target="_blank">📢 阅读公众号版本 →</a>';
    }
    container.innerHTML = html;
  }
</script>
