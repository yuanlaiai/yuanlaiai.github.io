<!DOCTYPE html>
<html lang="zh-CN">
<head>

  gtag('config', 'G-KH2VY5FWFK');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> GitHub AI 热点项目 · 时间线</title>
<style>
  :root {
    --bg: #0d1117;
    --card-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #d2991d;
    --purple: #a371f7;
    --red: #f85149;
    --cyan: #39d2c0;
    --line: #21262d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .hero {
    background: linear-gradient(135deg, #0a0e27 0%, #0d1117 40%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 20px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top:-50%; left:-50%;
    width:200%; height:200%;
    background: radial-gradient(circle at 25% 50%, rgba(88,166,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 75% 50%, rgba(163,113,247,0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 30%, rgba(57,210,192,0.05) 0%, transparent 40%);
    animation: heroPulse 12s ease-in-out infinite;
  }
  @keyframes heroPulse {
    0%,100% { opacity:0.5; }
    50% { opacity:1; }
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4.5vw, 2.6rem);
    font-weight:800;
    background: linear-gradient(135deg, #58a6ff, #a371f7, #39d2c0);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    position:relative; z-index:1;
  }
  .hero .sub {
    margin-top:10px; color:var(--muted); font-size:1rem; position:relative; z-index:1;
  }
  .hero .stats-row {
    display:flex; gap:20px; justify-content:center; flex-wrap:wrap;
    margin-top:16px; position:relative; z-index:1;
  }
  .hero .stat-mini {
    padding:6px 14px; background:var(--card-bg); border:1px solid var(--border);
    border-radius:20px; font-size:0.8rem; color:var(--muted);
  }
  .hero .stat-mini strong { color:var(--accent); }

  /* ========== TIMELINE ========== */
  .timeline {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 44px; top:0; bottom:0;
    width: 3px;
    background: linear-gradient(180deg,
      transparent 0%,
      var(--line) 5%,
      var(--border) 50%,
      var(--line) 95%,
      transparent 100%);
  }
  @media (max-width: 640px) {
    .timeline::before { left: 24px; }
    .timeline { padding: 28px 12px 60px; }
  }

  /* Date Node */
  .day-group {
    position: relative;
    margin-bottom: 52px;
  }
  .day-node {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-left: 44px;
  }
  @media (max-width: 640px) {
    .day-node { padding-left: 24px; }
  }
  .day-node::before {
    content: '';
    position: absolute;
    left: 35px; top: 50%; transform: translateY(-50%);
    width: 21px; height: 21px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 50%;
    border: 3px solid var(--bg);
    box-shadow: 0 0 12px rgba(88,166,255,0.3);
    z-index: 2;
  }
  @media (max-width: 640px) {
    .day-node::before { left: 15px; }
  }
  .day-node .day-icon { font-size: 1.4rem; }
  .day-node .day-title {
    font-size: 1.15rem; font-weight:700; color:var(--text);
  }
  .day-node .day-date {
    font-size:0.82rem; color:var(--muted); margin-left:auto;
    padding:4px 14px; border:1px solid var(--border); border-radius:16px;
    white-space:nowrap;
  }

  /* Project Cards inside a day */
  .day-projects {
    margin-left: 44px;
    display: flex; flex-direction: column; gap: 16px;
  }
  @media (max-width: 640px) {
    .day-projects { margin-left: 24px; }
  }
  .project-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .project-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(88,166,255,0.08);
  }
  .project-card .rank-ribbon {
    position: absolute; top:0; left:0;
    width: 4px; height: 100%;
    border-radius: 12px 0 0 12px;
  }
  .project-card[data-rank="1"] .rank-ribbon { background: linear-gradient(180deg, #f85149, #d2991d); }
  .project-card[data-rank="2"] .rank-ribbon { background: linear-gradient(180deg, #d2991d, #3fb950); }
  .project-card[data-rank="3"] .rank-ribbon { background: linear-gradient(180deg, #58a6ff, #a371f7); }
  .project-card[data-rank="4"] .rank-ribbon { background: linear-gradient(180deg, #a371f7, #39d2c0); }
  .project-card[data-rank="5"] .rank-ribbon { background: linear-gradient(180deg, #39d2c0, #58a6ff); }

  .pc-header {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:6px;
    padding-left: 4px;
  }
  .pc-header .icon { font-size:1.3rem; }
  .pc-header .repo-name {
    font-size:1.1rem; font-weight:700; color:var(--accent); text-decoration:none;
  }
  .pc-header .repo-name:hover { text-decoration:underline; }
  .pc-header .org { color:var(--muted); font-size:0.85rem; }
  .pc-meta {
    display:flex; gap:14px; flex-wrap:wrap; font-size:0.8rem; color:var(--muted);
    padding-left:4px; margin-bottom:12px;
  }
  .pc-meta .stars-today { color:var(--orange); font-weight:600; }
  .pc-meta .count-badge { color:var(--cyan); font-weight:600; }
  .lang-dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:3px; }
  .lang-dot.ts { background:#3178c6; } .lang-dot.py { background:#3572A5; }
  .lang-dot.js { background:#f1e05a; } .lang-dot.rs { background:#dea584; }
  .lang-dot.sh { background:#89e051; } .lang-dot.go { background:#00ADD8; }

  .pc-desc {
    font-size:0.9rem; color:var(--text); margin-bottom:14px;
    padding:10px 14px; background:rgba(88,166,255,0.04);
    border-left:3px solid var(--accent); border-radius:0 6px 6px 0;
    margin-left:4px;
  }
  .section-label {
    font-size:0.72rem; font-weight:700; text-transform:uppercase;
    letter-spacing:0.05em; color:var(--purple);
    margin:12px 0 4px; padding-left:4px;
  }
  .section-label.usage { color:var(--green); }
  .section-label.insight { color:var(--orange); }
  .section-content { font-size:0.87rem; color:var(--text); padding-left:4px; }
  .section-content ul, .section-content ol { padding-left:18px; }
  .section-content li { margin-bottom:4px; }
  .section-content pre {
    background:#0d1117; border:1px solid var(--border); border-radius:8px;
    padding:10px 14px; margin:8px 0; overflow-x:auto;
    font-size:0.8rem; line-height:1.45;
  }
  .section-content code {
    font-family:'SF Mono','Fira Code','Consolas',monospace;
    color:var(--green);
  }

  .tags {
    display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; padding-left:4px;
  }
  .tag {
    font-size:0.7rem; padding:2px 9px; border-radius:10px;
    background:rgba(88,166,255,0.08); color:var(--accent);
    border:1px solid rgba(88,166,255,0.15);
  }

  .footer {
    text-align:center; padding:30px;
    color:var(--muted); font-size:0.8rem;
    border-top:1px solid var(--border);
  }
  .footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>

<div class="hero">
  <h1> GitHub AI 热点项目 · 时间线</h1>
  <p class="sub">每日精选 5 个最受关注的 AI 开源项目：问题解析 + 快速上手 + 产品价值思路</p>
  <div class="stats-row">
    <div class="stat-mini"> 每日更新</div>
    <div class="stat-mini"> 数据来源 <strong>GitHub Trending</strong></div>
    <div class="stat-mini"> 累计收录 <strong id="dayCount">-</strong> 天</div>
  </div>
</div>

<div class="timeline" id="timeline"></div>

<div class="footer">
  <p> 数据来源：<a href="https://github.com/trending" target="_blank">GitHub Trending</a> · 最后更新：<span id="lastUpdated">-</span></p>
  <p style="margin-top:6px;">Built with  by Hermes Agent</p>
</div>

<script src="data.js?v=20260520"></script>
<script>
(function() {
  var data = siteData;
  document.getElementById('dayCount').textContent = data.days.length;
  document.getElementById('lastUpdated').textContent = data.lastUpdated;

  var timeline = document.getElementById('timeline');

  function fmtDate(dateStr) {
    var d = new Date(dateStr);
    return d.getFullYear() + '\u5e74' + (d.getMonth()+1) + '\u6708' + d.getDate() + '\u65e5';
  }

  var emojis = ['', '', '', '', '', '', ''];

  data.days.forEach(function(day, di) {
    var group = document.createElement('div');
    group.className = 'day-group';
    group.innerHTML =
      '<div class="day-node">' +
        '<span class="day-icon">' + (emojis[di % emojis.length] || '') + '</span>' +
        '<span class="day-title">' + fmtDate(day.date) + '</span>' +
        '<span class="day-date">' + day.label + '</span>' +
      '</div>' +
      '<div class="day-projects" id="proj-' + di + '"></div>';
    timeline.appendChild(group);

    var container = document.getElementById('proj-' + di);

    day.projects.forEach(function(p) {
      var card = document.createElement('div');
      card.className = 'project-card';
      card.setAttribute('data-rank', p.rank);

      var problemsHtml = '<ul>';
      p.problems.forEach(function(x) { problemsHtml += '<li>' + x + '</li>'; });
      problemsHtml += '</ul>';

      var usageHtml = '<ol>';
      p.usage.forEach(function(x) { usageHtml += '<li>' + x + '</li>'; });
      usageHtml += '</ol>';

      var insightsHtml = '<ul>';
      p.insights.forEach(function(x) { insightsHtml += '<li>' + x + '</li>'; });
      insightsHtml += '</ul>';

      var tagsHtml = '';
      p.tags.forEach(function(t) { tagsHtml += '<span class="tag">' + t + '</span>'; });

      card.innerHTML =
        '<div class="rank-ribbon"></div>' +
        '<div class="pc-header">' +
          '<span class="icon"></span>' +
          '<a class="repo-name" href="' + p.url + '" target="_blank">' + p.fullName + '</a>' +
          '<span class="org">by ' + p.org + '</span>' +
        '</div>' +
        '<div class="pc-meta">' +
          '<span><span class="lang-dot ' + p.langClass + '"></span> ' + p.lang + '</span>' +
          '<span> ' + p.stars + '</span>' +
          '<span> ' + p.forks + '</span>' +
          '<span class="stars-today"> ' + p.starsToday + ' stars today</span>' +
          '<span class="count-badge">' + (p.count > 1 ? ' · ' + p.count + '次上榜' : ' · 首次上榜') + '</span>' +
        '</div>' +
        '<div class="pc-desc">' + p.description + '</div>' +

        '<div class="section-label"> \u89e3\u51b3\u4ec0\u4e48\u95ee\u9898</div>' +
        '<div class="section-content">' + problemsHtml + '</div>' +

        '<div class="section-label usage"> \u5982\u4f55\u4f7f\u7528</div>' +
        '<div class="section-content">' + usageHtml + '</div>' +

        '<div class="section-label insight"> \u4ea7\u54c1\u4ef7\u503c\u601d\u8def</div>' +
        '<div class="section-content">' + insightsHtml + '</div>' +

        '<div class="tags">' + tagsHtml + '</div>';

      container.appendChild(card);
    });
  });
})();

</script>


</body>
</html>
