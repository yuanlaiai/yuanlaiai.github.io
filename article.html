<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .article-detail { max-width: 800px; margin: 0 auto; padding: 100px 24px 80px; }
  .article-detail .back-link {
    display: inline-block; margin-bottom: 32px;
    font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent-orange);
    text-decoration: none;
  }
  .article-detail .back-link:hover { text-decoration: underline; }
  .article-detail .meta {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px;
  }
  .article-detail .meta .tag {
    font-family: var(--font-mono); font-size: 0.75rem;
    padding: 3px 10px; background: var(--accent-cyan-dim);
    border: 1px solid rgba(0,217,255,0.2); border-radius: 4px; color: var(--accent-cyan);
  }
  .article-detail .meta .date { font-size: 0.85rem; color: var(--text-muted); }
  .article-detail .meta .read-time { font-size: 0.85rem; color: var(--text-muted); }
  .article-detail h1 {
    font-size: clamp(1.6rem, 3vw, 2rem); font-weight: 700;
    color: var(--text-primary); line-height: 1.4; margin-bottom: 32px;
  }
  .article-detail .body {
    font-size: 15px; line-height: 1.9;
    color: var(--text-secondary);
  }
  .article-detail .body p,
  .article-detail .body li,
  .article-detail .body section > p,
  .article-detail .body div > p {
    color: var(--text-secondary) !important;
  }
  .article-detail .body strong {
    color: var(--text-primary) !important;
  }
  .article-detail .body h2,
  .article-detail .body h3,
  .article-detail .body h1 {
    color: var(--text-primary) !important;
  }
  .article-detail .body blockquote p { color: var(--text-secondary) !important; }
  .article-detail .body pre { color: #e8e8e8 !important; }
  /* Override WeChat inline dark text colors */
  .article-detail .body [style*="color:#1a1a2e"],
  .article-detail .body [style*="color: #1a1a2e"],
  .article-detail .body [style*="color:#333"],
  .article-detail .body [style*="color: #333"],
  .article-detail .body [style*="color:#555"],
  .article-detail .body [style*="color: #555"],
  .article-detail .body [style*="color:#666"],
  .article-detail .body [style*="color: #666"],
  .article-detail .body [style*="color:#999"],
  .article-detail .body [style*="color: #999"] {
    color: var(--text-secondary) !important;
  }
  .article-detail .wechat-link {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 40px; padding: 12px 20px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 0.85rem; color: var(--accent-orange);
    text-decoration: none;
  }
  .article-detail .wechat-link:hover {
    border-color: var(--accent-orange);
    background: var(--accent-orange-dim);
  }
  #articleContent { display: none; }
  #articleContent.active { display: block; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="article-detail" id="articleDetail">
  <a href="javascript:history.back()" class="back-link">← 返回</a>
  <div id="articleContent" class="active"></div>
</div>

<script src="data.js?v=20260611c"></script>
<script>
  var params = new URLSearchParams(window.location.search);
  var id = parseInt(params.get('id')) || 0;
  var articles = window.siteData && window.siteData.articles ? window.siteData.articles : [];

  function findArticle() {
    for (var i = 0; i < articles.length; i++) {
      if (articles[i].id === id) return articles[i];
    }
    return null;
  }

  var article = findArticle();
  var container = document.getElementById('articleContent');

  if (!article) {
    container.innerHTML = '<div style="text-align:center;padding:80px 0"><h2 style="color:var(--text-primary)">文章不存在</h2><p style="color:var(--text-secondary);margin-top:16px"><a href="articles.html" style="color:var(--accent-orange)">浏览所有文章 →</a></p></div>';
  } else {
    var html = '';
    html += '<div class="meta">';
    for (var j = 0; j < article.tags.length; j++) {
      html += '<span class="tag">' + article.tags[j] + '</span>';
    }
    html += '<span class="date">' + article.date + '</span>';
    html += '<span class="read-time">' + article.readTime + '</span>';
    html += '</div>';
    html += '<h1>' + article.title + '</h1>';
    html += '<div class="body">' + article.content + '</div>';
    if (article.wechatUrl) {
      html += '<a class="wechat-link" href="' + article.wechatUrl + '" target="_blank">📢 阅读公众号版本 →</a>';
    }
    container.innerHTML = html;
  }
</script>
<script src="app.js"></script>
</body>
</html>
